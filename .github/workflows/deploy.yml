name: Deploy Tech Pulse Client

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-techpulseclient
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          NEXT_PUBLIC_API_SERVER: ${{ vars.NEXT_PUBLIC_API_SERVER }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITEMAP_SECRET: ${{ vars.NEXT_PUBLIC_SITEMAP_SECRET }}
          NEXT_PUBLIC_YANDEX_VERIFICATION: ${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}
          NEXT_PUBLIC_GOOGLE_VERIFICATION: ${{ vars.NEXT_PUBLIC_GOOGLE_VERIFICATION }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ vars.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_YANDEX_BLOCK_ID1: ${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID1 }}
          NEXT_PUBLIC_YANDEX_BLOCK_ID2: ${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID2 }}
          NEXT_PUBLIC_YANDEX_BLOCK_ID3: ${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID3 }}
          NEXT_PUBLIC_UPTOLIKE_WIDGET_PID: ${{ vars.NEXT_PUBLIC_UPTOLIKE_WIDGET_PID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          VK_CLIENT_ID: ${{ secrets.VK_CLIENT_ID }}
          VK_CLIENT_SECRET: ${{ secrets.VK_CLIENT_SECRET }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          mkdir -p .next/standalone/.next
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs

      - name: Deploy to VDS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VDS_SSH_KEY }}
          SERVER_HOST: ${{ secrets.VDS_HOST }}
          SERVER_USER: ${{ secrets.VDS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS $SERVER_USER@$SERVER_HOST "node -e \"const major = Number(process.versions.node.split('.')[0]); if (major < 20) { console.error('Node.js 20+ is required on VDS. Current: ' + process.version); process.exit(1); }\" && mkdir -p /var/www/techpulseclient"
          rsync -az --delete --timeout=60 -e "ssh $SSH_OPTS" .next/standalone/ $SERVER_USER@$SERVER_HOST:/var/www/techpulseclient
          ssh $SSH_OPTS $SERVER_USER@$SERVER_HOST "cd /var/www/techpulseclient && pm2 delete techpulseclient || true && NEXT_PUBLIC_API_SERVER='${{ vars.NEXT_PUBLIC_API_SERVER }}' NEXT_PUBLIC_SITE_URL='${{ vars.NEXT_PUBLIC_SITE_URL }}' NEXT_PUBLIC_SITEMAP_SECRET='${{ vars.NEXT_PUBLIC_SITEMAP_SECRET }}' NEXT_PUBLIC_YANDEX_VERIFICATION='${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}' NEXT_PUBLIC_GOOGLE_VERIFICATION='${{ vars.NEXT_PUBLIC_GOOGLE_VERIFICATION }}' NEXT_PUBLIC_YANDEX_METRIKA_ID='${{ vars.NEXT_PUBLIC_YANDEX_METRIKA_ID }}' NEXT_PUBLIC_YANDEX_BLOCK_ID1='${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID1 }}' NEXT_PUBLIC_YANDEX_BLOCK_ID2='${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID2 }}' NEXT_PUBLIC_YANDEX_BLOCK_ID3='${{ vars.NEXT_PUBLIC_YANDEX_BLOCK_ID3 }}' NEXT_PUBLIC_UPTOLIKE_WIDGET_PID='${{ vars.NEXT_PUBLIC_UPTOLIKE_WIDGET_PID }}' GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}' GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}' VK_CLIENT_ID='${{ secrets.VK_CLIENT_ID }}' VK_CLIENT_SECRET='${{ secrets.VK_CLIENT_SECRET }}' YANDEX_CLIENT_ID='${{ secrets.YANDEX_CLIENT_ID }}' YANDEX_CLIENT_SECRET='${{ secrets.YANDEX_CLIENT_SECRET }}' NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}' NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}' pm2 start ecosystem.config.cjs --update-env && pm2 save"
